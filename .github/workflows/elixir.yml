name: Erlang CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build and compile
    runs-on: ubuntu-22.04 # Fixed: Downgraded from ubuntu-latest (ubuntu-24.04) to ubuntu-22.04 to fix setup-beam ImageOS mapping error
    
    defaults:
      run:
        working-directory: core # Fixed: Point the action to the correct internal Erlang directory

    steps:
    - uses: actions/checkout@v4
    - name: Set up Erlang
      uses: erlef/setup-beam@v1
      with:
        otp-version: '26.0'
        rebar3-version: '3.23'
    - name: Restore rebar3 cache
      uses: actions/cache@v3
      with:
        path: ~/.cache/rebar3
        key: ${{ runner.os }}-rebar3-${{ hashFiles('**/rebar.lock') }}
        restore-keys: ${{ runner.os }}-rebar3-
    - name: Compile PORTO Core
      run: rebar3 compile
